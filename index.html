<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Duck Battle - Board Test</title>
  <style>
    body { font-family: sans-serif; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      grid-template-rows: repeat(5, 60px);
      gap: 2px;
      width: max-content;
      user-select: none;
    }
    .cell {
      width: 60px;
      height: 60px;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <h1>Space Duck Battle（盤面テスト）</h1>
  <div id="board"></div>

  <script>
    const board = document.getElementById("board");

    for (let y = 0; y < 5; y++) {
      for (let x = 0; x < 5; x++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.textContent = `${x},${y}`;
        board.appendChild(cell);
      }
    }
  </script>
</body>
</html>
