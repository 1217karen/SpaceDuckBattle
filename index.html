<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Duck Battle - Log Replay Test</title>
  <style>
    body { font-family: sans-serif; }
    #board {
      display: grid;
      grid-template-columns: repeat(5, 60px);
      grid-template-rows: repeat(5, 60px);
      gap: 2px;
      width: max-content;
      user-select: none;
      margin: 10px 0;
    }
    .cell {
      width: 60px;
      height: 60px;
      border: 1px solid #999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    #controls { margin: 10px 0; }
    button { font-size: 16px; padding: 6px 10px; }
    #status { margin-top: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Space Duck Battle（ログ再生テスト）</h1>

  <div id="controls">
    <button id="stepBtn">次へ（1ステップ）</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="board"></div>
  <div id="status"></div>

  <script>
    const W = 5, H = 5;

    // 盤面DOMを作る（[y][x]で取り出せるようにする）
    const boardEl = document.getElementById("board");
    const cells = [];
    for (let y = 0; y < H; y++) {
      const row = [];
      for (let x = 0; x < W; x++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.x = x;
        cell.dataset.y = y;
        boardEl.appendChild(cell);
        row.push(cell);
      }
      cells.push(row);
    }

    // --- ここからが「ログ再生」部分 ---

    // 「スナップショット的」な初期状態（超簡略）
    const initialState = {
      duck: { x: 0, y: 2, icon: "🐤" }
    };

    // 手書きログ：ひたすら右に進む（端で止まる前提）
    // typeは後で増やせます。今は move だけ。
    const battleLog = [
      { type: "move", unit: "duck", dx: 1, dy: 0, text: "🐤が右に1マス進む" },
      { type: "move", unit: "duck", dx: 1, dy: 0, text: "🐤が右に1マス進む" },
      { type: "move", unit: "duck", dx: 1, dy: 0, text: "🐤が右に1マス進む" },
      { type: "move", unit: "duck", dx: 1, dy: 0, text: "🐤が右に1マス進む" },
      { type: "move", unit: "duck", dx: 1, dy: 0, text: "🐤が右に1マス進む" } // 端なら止まる
    ];

    let state;
    let logIndex = 0;
    const statusEl = document.getElementById("status");

    function cloneState(src) {
      return {
        duck: { x: src.duck.x, y: src.duck.y, icon: src.duck.icon }
      };
    }

    function render() {
      // いったん全消し
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          cells[y][x].textContent = "";
        }
      }
      // アヒルを描画
      cells[state.duck.y][state.duck.x].textContent = state.duck.icon;

      // 状態表示
      statusEl.textContent =
        `位置: (${state.duck.x}, ${state.duck.y})\n` +
        `ログ: ${logIndex}/${battleLog.length}`;
    }

    function applyEvent(ev) {
      if (ev.type === "move" && ev.unit === "duck") {
        const nx = state.duck.x + ev.dx;
        const ny = state.duck.y + ev.dy;

        // チュートリアル仕様：端はループせず、盤面外に出ない（止まる）
        if (nx < 0 || nx >= W || ny < 0 || ny >= H) {
          statusEl.textContent += `\n${ev.text} → でも壁なので止まった`;
          return;
        }
        state.duck.x = nx;
        state.duck.y = ny;
        statusEl.textContent += `\n${ev.text}`;
      }
    }

    function reset() {
      state = cloneState(initialState);
      logIndex = 0;
      render();
      statusEl.textContent += `\nリセットしました`;
    }

    document.getElementById("stepBtn").addEventListener("click", () => {
      if (logIndex >= battleLog.length) {
        statusEl.textContent += `\nログが終わりました`;
        return;
      }
      const ev = battleLog[logIndex];
      logIndex++;
      applyEvent(ev);
      render();
    });

    document.getElementById("resetBtn").addEventListener("click", reset);

    // 初期表示
    reset();
  </script>
</body>
</html>
