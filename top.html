<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>トップ</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/common-theme.css">
<link rel="stylesheet" href="./css/favorites-panel.css">
</head>

<body>
<div class="layout">

  <aside class="left-panel">
    <div id="commonMenu"></div>
  </aside>

<main class="center-panel">
<div
  class="center-topbar"
  data-notice="お知らせエリア"
  data-right-label="FAV ＞"
></div>

  <h1 class="pageTitle">TOP</h1>

</main>

<aside class="right-panel"></aside>

</div>

<script type="module" src="./js/common/include-menu.js"></script>
<script type="module">
  import { initCenterTopbar } from "./js/common/center-topbar.js";
  import { initLayoutPanelToggles } from "./js/common/layout.js";
  import { renderFavoritesSidePanel } from "./js/common/favorites-panel.js";
  import { getFavoritePlaces } from "./js/chat/chat-place-utils.js";
  import { getFavoriteCharacters } from "./js/services/character-favorite-service.js";
  import { getCurrentAccount, requireLogin } from "./js/services/storage-service.js";
  import { addUnreadCountsToPlaces } from "./js/services/place-unread-service.js";

  initCenterTopbar();
  initLayoutPanelToggles();

  requireLogin();
  const account = getCurrentAccount();
  renderFavoritesSidePanel(document.querySelector(".right-panel"), {
    defaultTab: "place",
    favoritePlaces: addUnreadCountsToPlaces(getFavoritePlaces(), {
      viewerEno: account?.eno ?? null
    }),
    favoriteCharacters: getFavoriteCharacters({
      currentEno: account?.eno ?? null
    }),
    showCharacterMemo: true
  });
</script>
</body>
</html>
