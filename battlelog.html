<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Log</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Battle Log</h1>

<div id="board"></div>

<button id="nextBtn">次へ</button>

<div id="logArea"></div>

<script type="module">

import { createBoard, placeUnit, moveUnit } from "./js/board.js";

// =====================
// 盤面作成
// =====================

createBoard("board", 6, 6);

// UI側の現在状態
let boardState = {
  units: {}
};

// 初期配置
boardState.units["A"] = { x:1, y:1 };
boardState.units["B"] = { x:4, y:4 };

placeUnit("board", {
  id: "A",
  x: 1,
  y: 1,
  icon: "https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D00.webp"
});

placeUnit("board", {
  id: "B",
  x: 4,
  y: 4,
  icon: "https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D01.webp"
});

// =====================
// ログ取得
// =====================

const logArea = document.getElementById("logArea");
const nextBtn = document.getElementById("nextBtn");

const params = new URLSearchParams(window.location.search);
const battleID = params.get("id");

const stored = localStorage.getItem(battleID);

if (!stored) {
  logArea.textContent = "ログが見つかりません";
  nextBtn.disabled = true;
}

const battleLog = stored ? JSON.parse(stored) : [];

// ★ テスト用：最初に移動イベントを追加
battleLog.unshift({
  type:"move",
  unit:"A",
  x:2,
  y:1
});

let logIndex = 0;

// =====================
// イベント再生
// =====================

nextBtn.addEventListener("click", () => {

  if (logIndex >= battleLog.length) return;

  const event = battleLog[logIndex];
  const div = document.createElement("div");

  if (event.type === "turnStart") {
    div.textContent = `--- ターン ${event.turn} ---`;
  }

  else if (event.type === "attack") {
    div.textContent = `${event.from} が ${event.to} を攻撃 (${event.damage})`;
  }

  else if (event.type === "damage") {
    div.textContent = `${event.target} のHP → ${event.hp}`;
  }

  else if (event.type === "death") {
    div.textContent = `${event.target} が倒れた`;
  }

  else if (event.type === "battleEnd") {
    div.textContent = `戦闘終了 勝者: ${event.winner}`;
  }

  // ⭐ 移動イベント
  else if (event.type === "move") {

    moveUnit("board", event.unit, event.x, event.y);

    boardState.units[event.unit].x = event.x;
    boardState.units[event.unit].y = event.y;

    div.textContent = `${event.unit} が (${event.x},${event.y}) に移動`;
  }

  logArea.appendChild(div);

  logIndex++;
});

</script>

</body>
</html>
