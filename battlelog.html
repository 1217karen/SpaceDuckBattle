<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Log</title>
  <link rel="stylesheet" href="css/battlelog.css?v=3">
  
</head>
<div id="battleLayout">

  <!-- 上段 -->
  <div id="topArea">
<div id="leftHp"></div>
<div id="turnDisplay"></div>
<div id="rightHp"></div>
  </div>

  <!-- 中段 -->
  <div id="middleArea">
    <div id="enemySide"></div>

    <div id="boardArea">
      <div id="board"></div>
    </div>

    <div id="allySide"></div>

  <!-- 下段 -->

    <div class="bottomSide"></div>

    <div id="logArea"></div>

    <div class="bottomSide"></div>
  </div>

  <button id="nextBtn">次へ</button>

</div>

<script type="module" src="./js/battlelog-controller.js?v=3"></script>
