<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Log</title>
  <link rel="stylesheet" href="css/battlelog.css?v=1">

  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Iceberg&display=swap" rel="stylesheet">
  
</head>
<div id="battleLayout">

<div id="leftSide"></div>

<div id="centerArea">
<div id="centerContent">

  <div id="turnDisplay"></div>

<div id="boardFrame">
  <div id="boardScaleWrap">
    <div id="boardArea">
      <div id="board"></div>
    </div>

    <div id="cutinOverlay" class="hidden">
      <img id="cutinImage" alt="cutin">
    </div>
  </div>
</div>

<div id="commPanelRow">
  <button id="leftToggleBtn" class="sideToggleButton" type="button">TEAM1</button>

  <div id="commPanel">
    <div id="commIconFrame">
      <img
        id="commIcon"
        src="https://placehold.co/60x60?text=NO+IMG"
        alt="speaker icon"
      >
    </div>

    <div id="commTextArea">
      <div id="commLabel">COMMUNICATION LINK</div>
      <div id="commMessage">...</div>
    </div>
  </div>

  <button id="rightToggleBtn" class="sideToggleButton" type="button">TEAM2</button>
</div>

    <div id="battleControls">
      <button id="nextBtn">NEXT</button>
      <button id="autoBtn">AUTO</button>
      <button id="speedBtn">x1</button>
      <button id="skipBtn">SKIP</button>
      <button id="logBtn">LOG</button>
    </div>

    <div id="logArea"></div>

  </div>
</div>

<div id="rightSide"></div>


  
</div>

<script type="module" src="./js/new-battlelog-controller.js?v=1"></script>

<div id="backlogOverlay" class="hidden">
  <div id="backlogWindow">

    <div id="backlogHeader">
      <span>LOG</span>
      <button id="backlogClose">×</button>
    </div>

    <div id="backlogContent"></div>

  </div>
</div>

</html>
