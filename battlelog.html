<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Log</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Battle Log</h1>

<div id="board"></div>
<button id="nextBtn">次へ</button>
<div id="logArea"></div>

<script type="module">

import { createBoard, placeUnit, moveUnit, updateFacing } from "./js/board.js";

// =====================
// ログ取得（最初にやる）
// =====================

const logArea = document.getElementById("logArea");
const nextBtn = document.getElementById("nextBtn");

const params = new URLSearchParams(window.location.search);
const battleID = params.get("id");

const stored = localStorage.getItem(battleID);

if (!stored) {
  logArea.textContent = "ログが見つかりません";
  nextBtn.disabled = true;
}

const battleData = stored ? JSON.parse(stored) : null;
const snapshot = battleData ? battleData.snapshot : null;
const battleLog = battleData ? battleData.log : [];


// =====================
// 盤面作成
// =====================

createBoard("board", 6, 6);

let boardState = { units:{} };

// snapshot から初期配置
if (snapshot) {
  snapshot.units.forEach(u => {

    boardState.units[u.id] = { x:u.x, y:u.y };

    placeUnit("board", {
      id: u.id,
      x: u.x,
      y: u.y,
      icon: u.icon || "https://placehold.co/60x60"
    });

  });
}

let logIndex = 0;

// =====================
// イベント再生
// =====================

nextBtn.addEventListener("click", () => {

  if (logIndex >= battleLog.length) return;

  const event = battleLog[logIndex];
  const div = document.createElement("div");

  if (event.type === "turnStart") {
    div.textContent = `--- ターン ${event.turn} ---`;
  }
    
else if (event.type === "faceChange") {
  updateFacing("board", event.unit, event.facing);
  div.textContent = `${event.unit} の向きが ${event.facing} に変わった`;
}
  else if (event.type === "skillUse") {
  div.textContent = `${event.unit} が ${event.skill} を使用`;
}

else if (event.type === "attack") {
  div.textContent = `${event.from} が ${event.to} を攻撃 (${event.amount})`;
}

else if (event.type === "heal") {
  div.textContent = `${event.from} が ${event.to} を回復 (${event.amount})`;
}

else if (event.type === "hpChange") {
  div.textContent = `${event.target} のHP → ${event.hp}`;
}
  }

  else if (event.type === "death") {
    div.textContent = `${event.target} が倒れた`;
  }
else if (event.type === "heal") {
  div.textContent = `${event.target} のHP → ${event.hp} (回復)`;
}
  else if (event.type === "battleEnd") {
    div.textContent = `戦闘終了 勝者: ${event.winner}`;
  }

  else if (event.type === "move") {

    moveUnit("board", event.unit, event.x, event.y);

    boardState.units[event.unit].x = event.x;
    boardState.units[event.unit].y = event.y;

    div.textContent = `${event.unit} が (${event.x},${event.y}) に移動`;
  }

  logArea.appendChild(div);
  logIndex++;

});

</script>

</body>
</html>
