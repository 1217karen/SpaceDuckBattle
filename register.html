<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新規登録</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .register-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .register-box {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .register-title {
      margin: 0 0 20px;
      font-size: 24px;
      text-align: center;
    }

    .terms-box {
      margin-bottom: 20px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fafafa;
      min-height: 120px;
      box-sizing: border-box;
      white-space: pre-wrap;
    }

    .register-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: bold;
    }

    .form-group input {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .register-button {
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
    }

    .register-button:hover {
      opacity: 0.9;
    }

    .register-links {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
    }

    .register-links a {
      color: #4a90e2;
      text-decoration: none;
    }

    .register-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="register-page">
    <section class="register-box">
      <h1 class="register-title">新規登録</h1>

      <div class="terms-box">
利用規約をここに表示
      </div>

      <form class="register-form">
        <div class="form-group">
          <label for="registerId">ID</label>
          <input
            type="text"
            id="registerId"
            name="registerId"
            autocomplete="username"
          />
        </div>

        <div class="form-group">
          <label for="registerPassword">パスワード</label>
          <input
            type="password"
            id="registerPassword"
            name="registerPassword"
            autocomplete="new-password"
          />
        </div>

        <div class="form-group">
          <label for="registerPasswordConfirm">パスワード（確認用）</label>
          <input
            type="password"
            id="registerPasswordConfirm"
            name="registerPasswordConfirm"
            autocomplete="new-password"
          />
        </div>

        <button type="submit" class="register-button">登録する</button>
      </form>

      <div class="register-links">
        <a href="index.html">ログイン画面へ戻る</a>
      </div>
    </section>
  </main>

<script type="module" src="./js/register/register-controller.js"></script>
  
</body>
</html>
