<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>キャラ設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
</head>

<body>
<div class="layout">

  <aside class="left-panel">
    メニュー
  </aside>

  <main class="center-panel">

    <h1>キャラ設定</h1>

    <h2>名前</h2>

    <label>
      アヒル名（15文字以内）
      <input id="duckName" maxlength="15">
    </label>

    <h2>汎用セリフ</h2>

    <label>
      戦闘開始時セリフ
      <input id="battleStartText">
    </label>

    <br><br>

    <label>
      ターンチェンジ時セリフ
      <input id="turnChangeText">
    </label>

    <br><br>

    <button id="saveCharacter">キャラ設定を保存</button>

    <script type="module" src="./js/character-controller.js"></script>

  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
