<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>キャラ設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/common-theme.css">
<link rel="stylesheet" href="./css/character.css">
<link rel="stylesheet" href="./css/icon-picker.css">
  
</head>

<body>
<div class="layout">

  <div class="layout-topbar">
    <div class="layout-topbar-left"></div>
    <div class="layout-topbar-center">お知らせエリア</div>
    <div class="layout-topbar-right"></div>
  </div>

  <aside class="left-panel">
  <div id="commonMenu"></div>
</aside>

  <main class="center-panel">

<h1>キャラ設定</h1>

<h2>なまえ</h2><h2>名前</h2>

<label>
  キャラクターフルネーム（30文字以内）
  <input id="characterFullName" maxlength="30">
</label>

<br>

<label>
  キャラクターのデフォルト名（10文字以内）
  <input id="defaultCharacterName" maxlength="10">
</label>

<br>

<label>
  アヒル名（15文字以内）
  <input id="unitName" maxlength="15">
</label>

<label>
  キャラ説明
  <textarea id="characterProfileText" maxlength="500" rows="6"></textarea>
</label>

<br><br>

<h2>汎用セリフ</h2>

<div class="commBlock">
  <div class="commLabelText">戦闘開始時</div>
  <div id="battleStartList"></div>
  <button type="button" id="addBattleStartLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（拮抗）</div>
  <div id="turnChangeNeutralList"></div>
  <button type="button" id="addTurnChangeNeutralLine">＋</button>
</div>
    
<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（優勢）</div>
  <div id="turnChangeAdvantageList"></div>
  <button type="button" id="addTurnChangeAdvantageLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（劣勢）</div>
  <div id="turnChangeDisadvantageList"></div>
  <button type="button" id="addTurnChangeDisadvantageLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（窮地）</div>
  <div id="turnChangePinchList"></div>
  <button type="button" id="addTurnChangePinchLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">クリティカル時</div>
  <div id="criticalList"></div>
  <button type="button" id="addCriticalLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">敵撃破時</div>
  <div id="killList"></div>
  <button type="button" id="addKillLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">勝利時</div>
  <div id="battleEndWinList"></div>
  <button type="button" id="addBattleEndWinLine">＋</button>
</div>

<br><br>

<button id="saveCharacter">キャラ設定を保存</button>

<div id="iconPickerModal" class="iconPickerModal hidden">
  <div class="iconPickerWindow">
    <div class="iconPickerHeader">
      <span>アイコン選択</span>
      <button type="button" id="iconPickerClose">×</button>
    </div>

    <div id="iconPickerList" class="iconPickerList"></div>
  </div>
</div>

<script type="module" src="./js/character/character-controller.js"></script>
<script type="module" src="./js/common/include-menu.js"></script>
    
  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
