<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>キャラ設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/character.css">
<link rel="stylesheet" href="./css/icon-picker.css">
  
</head>

<body>
<div class="layout">

<aside class="left-panel">
  <div id="commonMenu"></div>
</aside>

  <main class="center-panel">

<h1>キャラ設定</h1>

<h2>名前</h2>

<label>
  アヒル名（15文字以内）
  <input id="duckName" maxlength="15">
</label>

<h2>汎用セリフ</h2>

<div class="commBlock">
  <div class="commLabelText">戦闘開始時セリフ</div>
  <div id="battleStartList"></div>
  <button type="button" id="addBattleStartLine">＋</button>
</div>
    
<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時セリフ</div>
  <div id="turnChangeList"></div>
  <button type="button" id="addTurnChangeLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">クリティカル時セリフ</div>
  <div id="criticalList"></div>
  <button type="button" id="addCriticalLine">＋</button>
</div>

<div class="commBlock">
  <div class="commLabelText">撃破時セリフ</div>
  <div id="killList"></div>
  <button type="button" id="addKillLine">＋</button>
</div>

<br><br>

<button id="saveCharacter">キャラ設定を保存</button>

<div id="iconPickerModal" class="iconPickerModal hidden">
  <div class="iconPickerWindow">
    <div class="iconPickerHeader">
      <span>アイコン選択</span>
      <button type="button" id="iconPickerClose">×</button>
    </div>

    <div id="iconPickerList" class="iconPickerList"></div>
  </div>
</div>

<script type="module" src="./js/character-controller.js"></script>
<script type="module" src="./js/include-menu.js"></script>
    
  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
