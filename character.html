<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>キャラ設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/common-theme.css">
<link rel="stylesheet" href="./css/character.css">
<link rel="stylesheet" href="./css/icon-picker.css">
  
</head>

<body>
<div class="layout">
  <aside class="left-panel">
  <div id="commonMenu"></div>
</aside>

<main class="center-panel">

<div
  class="center-topbar"
  data-notice="お知らせエリア"
  data-right-label="MEMO ＞"
></div>

<h2>キャラクター設定</h2>

<div class="characterNameForm">
  <label class="characterFormLabel" for="characterFullName">
    キャラクターフルネーム（30文字以内）
  </label>
  <input id="characterFullName" class="characterNameInput" maxlength="30">

  <label class="characterFormLabel" for="defaultCharacterName">
    キャラクターのデフォルト名（10文字以内）
  </label>
  <input id="defaultCharacterName" class="characterNameInput" maxlength="10">

  <label class="characterFormLabel" for="unitName">
    アヒル名（15文字以内）
  </label>
  <input id="unitName" class="characterNameInput" maxlength="15">

  <label class="characterFormLabel" for="characterProfileText">
    キャラ説明
  </label>
  <textarea id="characterProfileText" class="characterProfileTextarea" maxlength="500" rows="6"></textarea>
</div>

<br><br>

  
<div class="section-divider"></div>
<h2>戦闘セリフ</h2>

<div class="commBlock">
  <div class="commLabelText">戦闘開始時</div>
  <div id="battleStartList"></div>
  <button type="button" id="addBattleStartLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（拮抗）</div>
  <div id="turnChangeNeutralList"></div>
  <button type="button" id="addTurnChangeNeutralLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>
    
<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（優勢）</div>
  <div id="turnChangeAdvantageList"></div>
  <button type="button" id="addTurnChangeAdvantageLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（劣勢）</div>
  <div id="turnChangeDisadvantageList"></div>
  <button type="button" id="addTurnChangeDisadvantageLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">ターンチェンジ時（窮地）</div>
  <div id="turnChangePinchList"></div>
  <button type="button" id="addTurnChangePinchLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">クリティカル時</div>
  <div id="criticalList"></div>
  <button type="button" id="addCriticalLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">敵撃破時</div>
  <div id="killList"></div>
  <button type="button" id="addKillLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<div class="commBlock">
  <div class="commLabelText">勝利時</div>
  <div id="battleEndWinList"></div>
  <button type="button" id="addBattleEndWinLine" class="button-box">＋</button>
</div>
  
<div class="section-divider"></div>

<br><br>

<button id="saveCharacter" class="button-primaryNew">キャラ設定を保存</button>

<div id="iconPickerModal" class="iconPickerModal hidden"></div>   
  </main>

  <aside class="right-panel">

<div id="iconPickerModal" class="iconPickerModal hidden"></div>
    
    </main>

  <aside class="right-panel">
    MEMO
  </aside>

</div>

<script type="module" src="./js/character/character-controller.js"></script>
<script type="module" src="./js/common/include-menu.js"></script>
<script type="module">
  import { initCenterTopbar } from "./js/common/center-topbar.js";
  import { initLayoutPanelToggles } from "./js/common/layout.js";

  initCenterTopbar();
  initLayoutPanelToggles();
</script>

</body>
</html>
