<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>キャラ設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/character.css">
</head>

<body>
<div class="layout">

  <aside class="left-panel">
    メニュー
  </aside>

  <main class="center-panel">

<h1>キャラ設定</h1>

<h2>名前</h2>

<label>
  アヒル名（15文字以内）
  <input id="duckName" maxlength="15">
</label>

<h2>汎用セリフ</h2>

<div class="commRow">
  <button type="button" id="battleStartIconButton" class="commIconPickerButton">
    <img id="battleStartIconPreview" src="https://placehold.co/60x60?text=NO+IMG" alt="battle start icon">
  </button>

  <div class="commInputArea">
    <label class="commLabelText">戦闘開始時セリフ</label>
    <input id="battleStartText">
  </div>
</div>

<div class="commRow">
  <button type="button" id="turnChangeIconButton" class="commIconPickerButton">
    <img id="turnChangeIconPreview" src="https://placehold.co/60x60?text=NO+IMG" alt="turn change icon">
  </button>

  <div class="commInputArea">
    <label class="commLabelText">ターンチェンジ時セリフ</label>
    <input id="turnChangeText">
  </div>
</div>

<br><br>

<button id="saveCharacter">キャラ設定を保存</button>

<div id="iconPickerModal" class="iconPickerModal hidden">
  <div class="iconPickerWindow">
    <div class="iconPickerHeader">
      <span>アイコン選択</span>
      <button type="button" id="iconPickerClose">×</button>
    </div>

    <div id="iconPickerList" class="iconPickerList"></div>
  </div>
</div>

<script type="module" src="./js/character-controller.js"></script>

  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
