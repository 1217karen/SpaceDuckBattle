<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test２</title>
</head>
<body>
  <h1>Battle Test</h1>
  <button id="startBtn">戦闘開始</button>
  <button id="nextBtn">次へ</button>
<div id="logArea"></div>
<script type="module">
import { simulateBattle } from './js/battle-engine.js';

const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const logArea = document.getElementById("logArea");

let battleLog = [];
let logIndex = 0;

startBtn.addEventListener("click", () => {

  const snapshot = {
    units: [
      { id: "A", team: 1, hp: 30, atk: 5, speed: 10 },
      { id: "B", team: 2, hp: 30, atk: 5, speed: 8 }
    ]
  };

  const log = simulateBattle(snapshot);

  // 仮battleID生成
  const battleID = "battle_" + Date.now();

  // localStorageに保存
  localStorage.setItem(battleID, JSON.stringify(log));

  // 結果ページへ移動
  window.location.href = `battlelog.html?id=${battleID}`;
});

  function renderEvent(event) {

  const div = document.createElement("div");

  if (event.type === "turnStart") {
    div.textContent = `--- ターン ${event.turn} ---`;
  }

  else if (event.type === "attack") {
    div.textContent = `${event.from} が ${event.to} を攻撃 (${event.damage})`;
  }

  else if (event.type === "damage") {
    div.textContent = `${event.target} のHP → ${event.hp}`;
  }

  else if (event.type === "death") {
    div.textContent = `${event.target} が倒れた`;
  }

  else if (event.type === "battleEnd") {
    div.textContent = `戦闘終了 勝者: ${event.winner}`;
  }

  logArea.appendChild(div);
}
</script>
  
</body>
</html>
