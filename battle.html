<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>
</head>
<body>
  <h1>Battle Test</h1>
  <button id="startBtn">戦闘開始</button>
  <button id="nextBtn">次へ</button>
<div id="logArea"></div>
<script type="module">
import { simulateBattle } from './js/battle-engine.js';

const startBtn = document.getElementById("startBtn");
const nextBtn = document.getElementById("nextBtn");
const logArea = document.getElementById("logArea");

let battleLog = [];
let logIndex = 0;

startBtn.addEventListener("click", () => {

  const snapshot = {
    units: [
      { id: "A", team: 1, hp: 30, atk: 5, speed: 10 },
      { id: "B", team: 2, hp: 30, atk: 5, speed: 8 }
    ]
  };

  battleLog = simulateBattle(snapshot);
  logIndex = 0;
  logArea.innerHTML = "";
});

nextBtn.addEventListener("click", () => {

  if (logIndex >= battleLog.length) return;

  const event = battleLog[logIndex];

  const div = document.createElement("div");
  div.textContent = JSON.stringify(event);
  logArea.appendChild(div);

  logIndex++;
});
</script>
</body>
</html>
