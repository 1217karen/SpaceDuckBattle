<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>
</head>
<body>

<h1>Battle Test</h1>

<select id="stageSelect">
  <option value="tutorial">チュートリアル (4×4)</option>
  <option value="normal" selected>通常戦 (8×6)</option>
</select>

<button id="startBtn">戦闘開始</button>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';
import { createTestSnapshot } from "./js/test-data.js";
import { buildUnitFromDuck } from "./js/unit-builder.js";

const startBtn = document.getElementById("startBtn");
const stageSelect = document.getElementById("stageSelect");

startBtn.addEventListener("click", () => {

  const stageType = stageSelect.value;

  const snapshot = createTestSnapshot(stageType);

  const duckData = localStorage.getItem("duck");

if (duckData) {

  const duck = JSON.parse(duckData);

  const pattern = duck.patterns[0];

  const playerUnit =
    buildUnitFromDuck(
      duck,
      pattern,
      1,
      1,
      2,
      "E"
    );

  snapshot.units.push(playerUnit);

}

  const log = simulateBattle(snapshot);

  const battleID = "battle_" + Date.now();

Object.keys(localStorage).forEach(k => {
  if (k.startsWith("battle_")) {
    localStorage.removeItem(k);
  }
});
  
  localStorage.setItem(
    battleID,
    JSON.stringify({
      snapshot: snapshot,
      log: log
    })
  );

  window.location.href = `battlelog.html?id=${battleID}`;
});
</script>

</body>
</html>
