<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Test</title>
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
</head>

<body>

<div class="layout">

<aside class="left-panel">
メニュー
</aside>

<main class="center-panel">

<h1>Battle Test</h1>

<select id="stageSelect">
<option value="">ステージを選択</option>
<option value="tutorial">チュートリアル (4×4)</option>
<option value="normal">通常戦 (7×5)</option>
</select>

<button id="startBtn">戦闘開始</button>

<div id="party">
<div class="pt-slot" data-slot="0">PT1</div>
<div class="pt-slot" data-slot="1">PT2</div>
<div class="pt-slot" data-slot="2">PT3</div>
<div class="pt-slot" data-slot="3">PT4</div>
</div>

<h2>配置</h2>
<div id="board"></div>

<style>

#party{
display:flex;
gap:10px;
margin:10px 0;
}

.pt-slot{
width:64px;
height:64px;
border:2px solid #888;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.pt-slot:hover{
background:#eee;
}

#board{
display:grid;
gap:2px;
margin-top:10px;
}

.cell{
width:50px;
height:50px;
border:1px solid #888;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.cell:hover{
background:#ddd;
}

.pt-slot.selected{
border-color:#ff9900;
box-shadow:0 0 6px #ff9900;
}

#duckList{
display:flex;
flex-direction:column;
gap:10px;
}

.duck-item{
border:1px solid #888;
padding:5px;
cursor:pointer;
display:flex;
align-items:center;
gap:6px;
}

.duck-item img{
width:40px;
height:40px;
}

.duck-item.selected{
background:#ddd;
}

</style>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';
import { STAGES } from "./js/stages.js";
import { buildUnitFromDuck } from "./js/unit-builder.js";

const testDucks = [

{
name:"アヒル未設定",
type:"attack",

icon:{
main:"",
N:"",
E:"",
S:"",
W:""
},

mhp:1,

stats:{
atk:0,
def:0,
heal:0,
speed:0,
cri:0,
tec:0
},

patterns:[
{
name:"",
public:true,
skills:[]
}
]

},

{
name:"テストヒーラー",
type:"heal",

icon:{
main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D06.webp"
},

mhp:100,

stats:{
atk:1,
def:2,
heal:10,
speed:5,
cri:8,
tec:4
},

patterns:[
{
name:"基本",
public:true,
skills:[
"heal_cross2",
"repair_wave",
"satellite_meteor_field"
]
}
]

},

{
name:"テストアタッカー",
type:"attack",

icon:{
main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D08.webp"
},

mhp:120,

stats:{
atk:10,
def:3,
heal:1,
speed:6,
cri:5,
tec:5
},

patterns:[
{
name:"基本",
public:true,
skills:[
"attack_front1",
"attack_front_knockback",
"attack_around2_all"
]
}
]

},

{
name:"テストサポーター",
type:"support",

icon:{
main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D13.webp"
},

mhp:90,

stats:{
atk:4,
def:3,
heal:2,
speed:15,
cri:4,
tec:10
},

patterns:[
{
name:"基本",
public:true,
skills:[
"debuff_wave",
"buff_wave",
"pull_farthest_enemy"
]
}
]

}

];

/* settingで作成した自分アヒルを読み込む */

const savedDuck = localStorage.getItem("duck");

if (savedDuck) {

const playerDuck = JSON.parse(savedDuck);

testDucks[0] = playerDuck;

}

const duckListDiv = document.getElementById("duckList");

testDucks.forEach((duck,i)=>{

if(i === 0) return;

const item = document.createElement("div");
item.className = "duck-item";

const img = document.createElement("img");
img.src = duck.icon.main;

const name = document.createElement("span");
name.textContent = duck.name;

item.appendChild(img);
item.appendChild(name);

item.addEventListener("click",()=>{

const existingSlot = partySlots.indexOf(i);

/* すでにPTにいる → 解除 */

if(existingSlot !== -1){

if(existingSlot === 0) return;

/* 盤面配置を削除 */

if(placedSlots[existingSlot]){

const p = placedSlots[existingSlot];

const prevCell = document.querySelector(`.cell[data-x="${p.x}"][data-y="${p.y}"]`);

if(prevCell) prevCell.innerHTML = "";

delete placedSlots[existingSlot];

}
  
partySlots[existingSlot] = null;

renderParty();
item.classList.remove("selected");

return;

}

/* 空きスロットを探す */

for(let s=1; s<4; s++){

if(partySlots[s] === null){

partySlots[s] = i;

renderParty();

item.classList.add("selected");

break;

}

}

});

duckListDiv.appendChild(item);

});

const boardDiv = document.getElementById("board");
const ptSlots = document.querySelectorAll(".pt-slot");
const partySlots = [0,null,null,null];

function renderParty(){

ptSlots.forEach((slot,i)=>{

slot.innerHTML = "";

const duckIndex = partySlots[i];
if(duckIndex === null) return;

const duck = testDucks[duckIndex];

const img = document.createElement("img");
img.src = duck.icon.main;
img.style.width = "64px";
img.style.height = "64px";

slot.appendChild(img);

});

}

renderParty();

let selectedSlot = null;
const placedSlots = {};

ptSlots.forEach((slot) => {

slot.addEventListener("click", () => {

const slotIndex = parseInt(slot.dataset.slot);

/* アヒルがいないスロットは選択不可 */

if(partySlots[slotIndex] === null) return;

ptSlots.forEach(s => s.classList.remove("selected"));

slot.classList.add("selected");

selectedSlot = slotIndex;

console.log("selected slot", selectedSlot);

});

});

function createBoard(width, height){

boardDiv.innerHTML = "";
boardDiv.style.gridTemplateColumns = `repeat(${width}, 50px)`;

for(let y=0; y<height; y++){

for(let x=0; x<width; x++){

const cell = document.createElement("div");
cell.className = "cell";

cell.dataset.x = x;
cell.dataset.y = y;

cell.addEventListener("click", () => {

if(selectedSlot === null) return;

const duckIndex = partySlots[selectedSlot];
const duck = testDucks[duckIndex];
if(!duck) return;

/* ① 同じPTがすでに配置されていたら消す */

if(placedSlots[selectedSlot]){

const prev = placedSlots[selectedSlot];

const prevCell = document.querySelector(`.cell[data-x="${prev.x}"][data-y="${prev.y}"]`);

if(prevCell) prevCell.innerHTML = "";

}

/* ② このセルに別PTがいたら消す */

Object.keys(placedSlots).forEach(slot => {

const p = placedSlots[slot];

if(p.x == x && p.y == y){

const prevCell = document.querySelector(`.cell[data-x="${p.x}"][data-y="${p.y}"]`);

if(prevCell) prevCell.innerHTML = "";

delete placedSlots[slot];

}

});

/* ③ 新しく配置 */

cell.innerHTML = "";

const img = document.createElement("img");
img.src = duck.icon.main;
img.style.width = "40px";
img.style.height = "40px";

cell.appendChild(img);

placedSlots[selectedSlot] = {x,y};

/* ④ 選択解除 */

selectedSlot = null;
ptSlots.forEach(s => s.classList.remove("selected"));

});

boardDiv.appendChild(cell);

}

}

}

const startBtn = document.getElementById("startBtn");
const stageSelect = document.getElementById("stageSelect"); 

  startBtn.addEventListener("click", () => {

    /* 未配置PTチェック */

for(let slot = 0; slot < 4; slot++){

const duckIndex = partySlots[slot];
if(duckIndex === null) continue;

if(!placedSlots[slot]){

alert("PTに編成されているアヒルがまだ配置されていません");

return;

}

}

const stageType = stageSelect.value;
if(!stageType) return;

const stage = STAGES[stageType];

const snapshot = {
board: stage.board,
maxTurns: stage.maxTurns,
units: [...stage.enemies]
};

/* プレイヤーユニット追加 */

for(let slot = 0; slot < 4; slot++){

const duckIndex = partySlots[slot];
if(duckIndex === null) continue;

const placement = placedSlots[slot];
if(!placement) continue;

const duck = testDucks[duckIndex];
const pattern = duck.patterns[0];

const unit = buildUnitFromDuck(
duck,
pattern,
1,
placement.x,
placement.y,
"E",
duckIndex
);

snapshot.units.push(unit);

}

    console.log("SNAPSHOT", JSON.stringify(snapshot,null,2));
const log = simulateBattle(snapshot);

const battleID = "battle_" + Date.now();

Object.keys(localStorage).forEach(k => {
if (k.startsWith("battle_")) {
localStorage.removeItem(k);
}
});

localStorage.setItem(
battleID,
JSON.stringify({
snapshot: snapshot,
log: log
})
);

window.location.href = `battlelog.html?id=${battleID}`;

});
  

stageSelect.addEventListener("change", () => {

if(!stageSelect.value){

boardDiv.innerHTML = "";
resetPlacement();
return;

}
  
const stage = STAGES[stageSelect.value];

createBoard(stage.board.width, stage.board.height);

resetPlacement();

});

let selectedCell = null;

function resetPlacement(){
selectedCell = null;
}

</script>

</main>

<aside class="right-panel">
<h2>アヒル一覧</h2>
<div id="duckList"></div>
</aside>

</div>

</body>

</html>
```
