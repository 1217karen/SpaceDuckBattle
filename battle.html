<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Test</title>
<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/battle.css">
</head>

<body>

<div class="layout">

  <aside class="left-panel">
    <div id="commonMenu"></div>
  </aside>

  <main class="center-panel">

    <h1>Battle Test</h1>

    <select id="stageSelect">
      <option value="">ステージを選択</option>
      <option value="tutorial">チュートリアル (4×4)</option>
      <option value="test_9x7">テスト (9×7)</option>
      <option value="normal">通常戦 (7×5)</option>
    </select>

    <button id="startBtn">戦闘開始</button>

    <div id="party">
      <div class="pt-slot" data-slot="0">PT1</div>
      <div class="pt-slot" data-slot="1">PT2</div>
      <div class="pt-slot" data-slot="2">PT3</div>
      <div class="pt-slot" data-slot="3">PT4</div>
    </div>

    <h2>配置</h2>
    <div id="board"></div>

  </main>

  <aside class="right-panel">
    <h2>アヒル一覧</h2>
    <div id="duckList"></div>
  </aside>

</div>

<script type="module" src="./js/include-menu.js"></script>
<script type="module" src="./js/battle-controller.js"></script>

</body>
</html>
