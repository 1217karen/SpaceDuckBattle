<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>
</head>
<body>

<h1>Battle Test</h1>

<select id="stageSelect">
  <option value="">ステージを選択</option>
  <option value="tutorial">チュートリアル (4×4)</option>
  <option value="normal">通常戦 (7×5)</option>
</select>

<button id="startBtn">戦闘開始</button>

  <h2>配置</h2>

<div id="board"></div>

<style>

#board{
  display:grid;
  gap:2px;
  margin-top:10px;
}

.cell{
  width:50px;
  height:50px;
  border:1px solid #888;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.cell:hover{
  background:#ddd;
}

</style>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';
import { createTestSnapshot } from "./js/test-data.js";
import { buildUnitFromDuck } from "./js/unit-builder.js";

  const boardDiv =
  document.getElementById("board");

function createBoard(width, height){

  boardDiv.innerHTML = "";

  boardDiv.style.gridTemplateColumns =
    `repeat(${width}, 50px)`;

  for(let y=0; y<height; y++){

    for(let x=0; x<width; x++){

      const cell =
        document.createElement("div");

      cell.className = "cell";

      cell.dataset.x = x;
      cell.dataset.y = y;

cell.addEventListener("click", () => {

  document.querySelectorAll(".cell").forEach(c => {
    c.style.background = "";
  });

  cell.style.background = "#ffd966";

  selectedCell = { x, y };

  console.log("selected", x, y);

});

      boardDiv.appendChild(cell);

    }

  }

}

const startBtn = document.getElementById("startBtn");
const stageSelect = document.getElementById("stageSelect");

  stageSelect.addEventListener("change", () => {

  const stageSnapshot =
    createTestSnapshot(stageSelect.value);

  createBoard(
    stageSnapshot.board.width,
    stageSnapshot.board.height
  );

  resetPlacement();

});

  let selectedCell = null;

function resetPlacement(){
  selectedCell = null;
}

startBtn.addEventListener("click", () => {

  const stageType = stageSelect.value;
  
  const snapshot = createTestSnapshot(stageType);

  const duckData = localStorage.getItem("duck");

if (duckData) {

  const duck = JSON.parse(duckData);

  const pattern = duck.patterns[0];

  const playerUnit =
    buildUnitFromDuck(
      duck,
      pattern,
      1,
      1,
      2,
      "E"
    );

  snapshot.units.push(playerUnit);

}

  const log = simulateBattle(snapshot);

  const battleID = "battle_" + Date.now();

Object.keys(localStorage).forEach(k => {
  if (k.startsWith("battle_")) {
    localStorage.removeItem(k);
  }
});
  
  localStorage.setItem(
    battleID,
    JSON.stringify({
      snapshot: snapshot,
      log: log
    })
  );

  window.location.href = `battlelog.html?id=${battleID}`;
});

  const firstStage =
  createTestSnapshot(stageSelect.value);

createBoard(
  firstStage.board.width,
  firstStage.board.height
);
</script>

</body>
</html>
