<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">

</head>
<body>

<div class="layout">

  <aside class="left-panel">
  メニュー
  </aside>

  <main class="center-panel">

<h1>Battle Test</h1>

<select id="stageSelect">
  <option value="">ステージを選択</option>
  <option value="tutorial">チュートリアル (4×4)</option>
  <option value="normal">通常戦 (7×5)</option>
</select>

<button id="startBtn">戦闘開始</button>

<div id="party">

<div class="pt-slot" data-slot="0">PT1</div>
<div class="pt-slot" data-slot="1">PT2</div>
<div class="pt-slot" data-slot="2">PT3</div>
<div class="pt-slot" data-slot="3">PT4</div>

</div>
    
  <h2>配置</h2>

<div id="board"></div>

<style>

  #party{
  display:flex;
  gap:10px;
  margin:10px 0;
}

.pt-slot{
  width:80px;
  height:80px;
  border:2px solid #888;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.pt-slot:hover{
  background:#eee;
}

#board{
  display:grid;
  gap:2px;
  margin-top:10px;
}

.cell{
  width:50px;
  height:50px;
  border:1px solid #888;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.cell:hover{
  background:#ddd;
}

</style>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';
import { createTestSnapshot } from "./js/test-data.js";
import { buildUnitFromDuck } from "./js/unit-builder.js";

const testDucks = [
{
  name:"自分アヒル",
  icon:{
    main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D01.webp",
    N:"https://dummyimage.com/64x64/ffd966/000000&text=N",
    E:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D01.webp",
    S:"https://dummyimage.com/64x64/ffd966/000000&text=S",
    W:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D00.webp"
  }
},
{
  name:"テストアヒルA",
  icon:{
    main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D06.webp"
  }
},
{
  name:"テストアヒルB",
  icon:{
    main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D08.webp"
  }
},
{
  name:"テストアヒルC",
  icon:{
    main:"https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D13.webp"
  }
}
];
  
  const boardDiv =
  document.getElementById("board");

  const ptSlots = document.querySelectorAll(".pt-slot");

ptSlots.forEach((slot, i) => {

  const duck = testDucks[i];

  if(!duck) return;

  const img = document.createElement("img");

  img.src = duck.icon.main;
  img.style.width = "64px";
  img.style.height = "64px";

  slot.innerHTML = "";
  slot.appendChild(img);

});

function createBoard(width, height){

  boardDiv.innerHTML = "";

  boardDiv.style.gridTemplateColumns =
    `repeat(${width}, 50px)`;

  for(let y=0; y<height; y++){

    for(let x=0; x<width; x++){

      const cell =
        document.createElement("div");

      cell.className = "cell";

      cell.dataset.x = x;
      cell.dataset.y = y;

cell.addEventListener("click", () => {

  document.querySelectorAll(".cell").forEach(c => {
    c.style.background = "";
  });

  cell.style.background = "#ffd966";

  selectedCell = { x, y };

  console.log("selected", x, y);

});

      boardDiv.appendChild(cell);

    }

  }

}

const startBtn = document.getElementById("startBtn");
const stageSelect = document.getElementById("stageSelect");

stageSelect.addEventListener("change", () => {

  if(!stageSelect.value){

    boardDiv.innerHTML = "";
    resetPlacement();
    return;

  }

  const stageSnapshot =
    createTestSnapshot(stageSelect.value);

  createBoard(
    stageSnapshot.board.width,
    stageSnapshot.board.height
  );

  resetPlacement();

});

  let selectedCell = null;

function resetPlacement(){
  selectedCell = null;
}

startBtn.addEventListener("click", () => {

  const stageType = stageSelect.value;
  
  const snapshot = createTestSnapshot(stageType);

  const duckData = localStorage.getItem("duck");

if (duckData) {

  const duck = JSON.parse(duckData);

  const pattern = duck.patterns[0];

  const playerUnit =
    buildUnitFromDuck(
      duck,
      pattern,
      1,
      1,
      2,
      "E"
    );

  snapshot.units.push(playerUnit);

}

  const log = simulateBattle(snapshot);

  const battleID = "battle_" + Date.now();

Object.keys(localStorage).forEach(k => {
  if (k.startsWith("battle_")) {
    localStorage.removeItem(k);
  }
});
  
  localStorage.setItem(
    battleID,
    JSON.stringify({
      snapshot: snapshot,
      log: log
    })
  );

  window.location.href = `battlelog.html?id=${battleID}`;
});

</script>


  </main>

  <aside class="right-panel">
  補助エリア
  </aside>

</div>

</body>
  

</body>
</html>
