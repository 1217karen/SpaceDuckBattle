<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>
</head>
<body>

<h1>Battle Test</h1>
<button id="startBtn">戦闘開始</button>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';
import { createTestSnapshot } from "./js/test-data.js";
  
const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", () => {

const snapshot = createTestSnapshot();

  const log = simulateBattle(snapshot);

  const battleID = "battle_" + Date.now();

localStorage.setItem(
  battleID,
  JSON.stringify({
    snapshot: snapshot,
    log: log
  })
);

  window.location.href = `battlelog.html?id=${battleID}`;
});
</script>

</body>
</html>
