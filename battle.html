<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Battle Test</title>
</head>
<body>

<h1>Battle Test</h1>
<button id="startBtn">戦闘開始</button>

<script type="module">
import { simulateBattle } from './js/battle-engine.js';

const startBtn = document.getElementById("startBtn");

startBtn.addEventListener("click", () => {

const snapshot = {
  units: [
    { 
      id: "A",
      team: 1,
      hp: 30,
      atk: 5,
      speed: 10,
      x:1,
      y:1,
  facing:"N",
      icon: "https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D00.webp",
      skills: [
  { type: "attack_front1" }
],
    },
    { 
      id: "B",
      team: 2,
      hp: 30,
      atk: 5,
      speed: 8,
      x:4,
      y:4,
  facing:"N",
      icon: "https://www.rabbithutch.site/usagoya/picture.php?user=1217karen&file=D01.webp",
      skills: [
  { type: "attack_front1" }
],
    }
  ]
};

  const log = simulateBattle(snapshot);

  const battleID = "battle_" + Date.now();

localStorage.setItem(
  battleID,
  JSON.stringify({
    snapshot: snapshot,
    log: log
  })
);

  window.location.href = `battlelog.html?id=${battleID}`;
});
</script>

</body>
</html>
