<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>初期設定</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    .setup-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .setup-box {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .setup-title {
      margin: 0 0 12px;
      font-size: 24px;
      text-align: center;
    }

    .setup-description {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #555;
    }

    .setup-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: bold;
    }

    .form-group input {
      padding: 10px 12px;
      font-size: 16px;
      border: 1px solid #bbb;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .setup-button {
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
    }

    .setup-button:hover {
      opacity: 0.9;
    }

    .setup-eno {
  margin: 0 0 20px;
  padding: 10px 12px;
  background: #f0f7ff;
  border: 1px solid #bcd8f2;
  border-radius: 8px;
  font-size: 14px;
}
  </style>
</head>
<body>
  <main class="setup-page">
    <section class="setup-box">
      <h1 class="setup-title">初期設定</h1>
      <p class="setup-description">
        キャラクター名とユニット名を登録してください。<br>
        このページは仮の初期設定画面です。
      </p>
      <p class="setup-eno" id="setupEnoText"></p>

      <form class="setup-form">
        <div class="form-group">
          <label for="fullName">フルネーム</label>
          <input
            type="text"
            id="fullName"
            name="fullName"
          />
        </div>

        <div class="form-group">
          <label for="defaultName">デフォルトネーム</label>
          <input
            type="text"
            id="defaultName"
            name="defaultName"
          />
        </div>

        <div class="form-group">
          <label for="unitName">ユニット名</label>
          <input
            type="text"
            id="unitName"
            name="unitName"
          />
        </div>

        <button type="submit" class="setup-button">登録する</button>
      </form>
    </section>
  </main>
  
<script type="module" src="./js/first-setup/first-setup-controller.js"></script>
  </body>
</html>
