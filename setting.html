<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アヒル設定</title>
</head>

<body>

<h1>アヒル設定</h1>

<h2>基本情報</h2>

<label>
アヒル名（15文字以内）
<input id="duckName" maxlength="15">
</label>

<br><br>

<label>
タイプ
<select id="duckType">
<option value="attack">アタック</option>
<option value="defense">ディフェンス</option>
<option value="heal">ヒール</option>
<option value="speed">スピード</option>
<option value="technical">テクニカル</option>
<option value="support">サポート</option>
</select>
</label>


<h2>アイコン</h2>

<label>メインアイコンURL <input id="iconMain"></label><br>
<label>北アイコンURL <input id="iconN"></label><br>
<label>東アイコンURL <input id="iconE"></label><br>
<label>南アイコンURL <input id="iconS"></label><br>
<label>西アイコンURL <input id="iconW"></label>


<h2>ステータス</h2>

<label>AT <input type="number" id="statAT" value="0"></label><br>
<label>DF <input type="number" id="statDF" value="0"></label><br>
<label>HEAL <input type="number" id="statHEAL" value="0"></label><br>
<label>SPEED <input type="number" id="statSPEED" value="0"></label><br>
<label>CRI <input type="number" id="statCRI" value="0"></label><br>
<label>INT <input type="number" id="statINT" value="0"></label>


<h2>スキル</h2>

<select class="skillSelect">
<option value="">なし</option>
</select><br>

<select class="skillSelect">
<option value="">なし</option>
</select><br>

<select class="skillSelect">
<option value="">なし</option>
</select><br>

<select class="skillSelect">
<option value="">なし</option>
</select><br>

<select class="skillSelect">
<option value="">なし</option>
</select><br>

<select class="skillSelect">
<option value="">なし</option>
</select>


<br><br>

<button id="saveDuck">アヒル保存</button>


  <script type="module" src="./js/setting-controller.js"></script>
</body>
</html>
