<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>アヒル設定</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
</head>

<body>
<div class="layout">

  <aside class="left-panel">
    メニュー
  </aside>

  <main class="center-panel">

    <h1>ユニット設定</h1>

    <h2>タイプ</h2>

    <label>
      タイプ
      <select id="duckType">
        <option value="attack">アタック</option>
        <option value="defense">ディフェンス</option>
        <option value="heal">ヒール</option>
        <option value="speed">スピード</option>
        <option value="technical">テクニカル</option>
        <option value="support">サポート</option>
      </select>
    </label>

    <h2>ステータス</h2>

    <label>ATK <input type="number" id="statAT" value="0"></label><br>
    <label>DEF <input type="number" id="statDF" value="0"></label><br>
    <label>HEAL <input type="number" id="statHEAL" value="0"></label><br>
    <label>SPEED <input type="number" id="statSPEED" value="0"></label><br>
    <label>CRI <input type="number" id="statCRI" value="0"></label><br>
    <label>TEC <input type="number" id="statTEC" value="0"></label>

    <h2>スキル設定</h2>

    <div id="patternTabs">
      <button class="patternTab" data-slot="0">設定1</button>
      <button class="patternTab" data-slot="1">設定2</button>
      <button class="patternTab" data-slot="2">設定3</button>
    </div>

    <br>

    <label>
      パターン名
      <input id="patternName">
    </label>

    <br><br>

    <label>
      公開
      <input type="checkbox" id="patternPublic">
    </label>

    <br><br>

    <div id="skillArea"></div>

    <br><br>

    <button id="saveDuck">設定を保存</button>

<div id="iconPickerModal" class="iconPickerModal hidden">
  <div class="iconPickerWindow">
    <div class="iconPickerHeader">
      <span>アイコン選択</span>
      <button type="button" id="iconPickerClose">×</button>
    </div>

    <div id="iconPickerList" class="iconPickerList"></div>
  </div>
</div>

    <script type="module" src="./js/setting-controller.js"></script>

  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
