<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>画像登録</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/common-theme.css">
<link rel="stylesheet" href="./css/assets.css">
</head>

<body>
<div class="layout">

<aside class="left-panel">
  <div id="commonMenu"></div>
</aside>

  <main class="center-panel">

    <h1>画像登録</h1>

<div class="section-divider"></div>
<h2>アヒルアイコン登録</h2>

<label for="iconDefault">デフォルトアイコンURL</label>
<div class="defaultIconRow">
  <img id="iconDefaultPreview" class="commIconPreview" src="" alt="アヒルデフォルトアイコン">
  <input id="iconDefault">
</div>

<label>北アイコンURL <input id="iconN"></label><br>
<label>東アイコンURL <input id="iconE"></label><br>
<label>南アイコンURL <input id="iconS"></label><br>
<label>西アイコンURL <input id="iconW"></label>

<div class="section-divider"></div>
<h2>プロフィール画像登録</h2>

<div id="profileImageArea"></div>

<br>

<button type="button" id="addProfileImage">プロフィール画像枠を追加</button>

<div class="section-divider"></div>
<h2>キャラクターアイコン登録</h2>

<label for="characterDefaultIcon">デフォルトアイコンURL</label>
<div class="defaultIconRow">
  <img id="characterDefaultIconPreview" class="commIconPreview" src="" alt="デフォルトアイコン">
  <input id="characterDefaultIcon">
</div>
<br>
<br>
<br>
<h3>アイコン一覧</h3>
<div id="commIconArea"></div>

<br>

<button type="button" id="addCommIcon">アイコン枠を追加</button>

<br>
<br>
<br>
<h3>アイコン一括登録</h3>
<label for="bulkCommIconUrls">改行区切りでアイコンURLを入力</label>
<br>
<textarea id="bulkCommIconUrls" rows="6"></textarea>

<div class="section-divider"></div>
    
<button id="saveManagement">設定を保存する</button>
<br>
<br>
<br>

<script type="module" src="./js/assets/assets-controller.js"></script>
<script type="module" src="./js/common/include-menu.js"></script>

  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
