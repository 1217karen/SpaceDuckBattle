<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>画像登録</title>

<link rel="stylesheet" href="./css/layout.css">
<link rel="stylesheet" href="./css/common.css">
<link rel="stylesheet" href="./css/common-theme.css">
<link rel="stylesheet" href="./css/assets.css">
</head>

<body>
<div class="layout">

<aside class="left-panel">
  <div id="commonMenu"></div>
</aside>

<main class="center-panel">

    <div class="center-topbar">
      <div class="center-topbar-left"></div>
      <div class="center-topbar-center">お知らせエリア</div>
      <div class="center-topbar-right"></div>
    </div>

    <h1>画像登録</h1>

<div class="section-divider"></div>
<h2>アヒルアイコン登録</h2>

<div class="imageInputRow">
  <img id="iconDefaultPreview" class="imageInputPreview" src="" alt="アヒルデフォルトアイコン">
  <div class="imageInputBody">
    <label class="imageInputLabel" for="iconDefault">デフォルトアイコンURL</label>
    <input id="iconDefault" class="imageInputControl">
  </div>
</div>
<br>
<br>
<label class="directionIconInputLabel">北向きアイコンURL <input id="iconN"></label>
<label class="directionIconInputLabel">東向きアイコンURL <input id="iconE"></label>
<label class="directionIconInputLabel">南向きアイコンURL <input id="iconS"></label>
<label class="directionIconInputLabel">西向きアイコンURL <input id="iconW"></label>
<p class="text-muted">
  ※北・東・南・西アイコンが未入力の場合は、デフォルトアイコンが使用されます。
</p>

<div class="directionIconPreviewRow">
  <div class="directionIconPreviewItem">
    <div class="directionIconLabel">↑ 北 ↑</div>
    <img id="iconNPreview" class="imageInputPreview" src="" alt="北アイコン">
  </div>
  <div class="directionIconPreviewItem">
    <div class="directionIconLabel">→ 東 →</div>
    <img id="iconEPreview" class="imageInputPreview" src="" alt="東アイコン">
  </div>
  <div class="directionIconPreviewItem">
    <div class="directionIconLabel">↓ 南 ↓</div>
    <img id="iconSPreview" class="imageInputPreview" src="" alt="南アイコン">
  </div>
  <div class="directionIconPreviewItem">
    <div class="directionIconLabel">← 西 ←</div>
    <img id="iconWPreview" class="imageInputPreview" src="" alt="西アイコン">
  </div>
</div>

<div class="section-divider"></div>
<h2>プロフィール画像登録</h2>

<div id="profileImageArea"></div>

<br>

<button type="button" id="addProfileImage">プロフィール画像枠を追加</button>

<div class="section-divider"></div>
<h2>キャラクターアイコン登録</h2>

<div class="imageInputRow">
  <img id="characterDefaultIconPreview" class="imageInputPreview" src="" alt="デフォルトアイコン">
  <div class="imageInputBody">
    <label class="imageInputLabel" for="characterDefaultIcon">デフォルトアイコンURL</label>
    <input id="characterDefaultIcon" class="imageInputControl">
  </div>
</div>
<br>
<br>
<br>

<h3>アイコン一覧</h3>
<p class="text-muted">
  アイコン画像をドラッグすると並べ替えできます。
</p>

<div id="commIconArea"></div>
<br>
<button type="button" id="addCommIcon">アイコン枠を追加</button>
<br>
<br>
<br>
<h3>アイコン一括登録</h3>
<label for="bulkCommIconUrls">改行区切りでアイコンURLを入力</label>
<br>
<textarea id="bulkCommIconUrls" rows="6"></textarea>

<div class="section-divider"></div>
    
<button id="saveManagement">設定を保存する</button>
<br>
<br>
<br>

<script type="module" src="./js/assets/assets-controller.js"></script>
<script type="module" src="./js/common/include-menu.js"></script>

  </main>

  <aside class="right-panel">
    補助エリア
  </aside>

</div>
</body>
</html>
